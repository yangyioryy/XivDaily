openapi: 3.1.0
info:
  title: XivDaily API Draft
  version: 0.1.0
  description: >
    XivDaily 当前后端接口草案。路径与字段以仓库内真实 FastAPI 实现为准。
servers:
  - url: http://127.0.0.1:8000
    description: 本机开发环境
tags:
  - name: Health
  - name: Papers
  - name: AI
  - name: Zotero
paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        "200":
          description: 服务健康
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /papers:
    get:
      tags: [Papers]
      summary: 查询论文列表
      operationId: listPapers
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 搜索关键词
        - in: query
          name: category
          schema:
            type: string
          description: arXiv 分类，如 cs.CV
        - in: query
          name: days
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 30
          description: 回溯天数
        - in: query
          name: page
          required: true
          schema:
            type: integer
            minimum: 1
          description: 页码
        - in: query
          name: pageSize
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: 每页数量
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperListResponse"
  /summaries/trends:
    get:
      tags: [AI]
      summary: 生成当前时间窗口趋势摘要
      operationId: getTrendSummary
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: 聚焦领域
        - in: query
          name: days
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 30
          description: 回溯天数
      responses:
        "200":
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendSummary"
  /translations:
    post:
      tags: [AI]
      summary: 翻译单篇论文摘要
      operationId: createTranslation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationRequest"
      responses:
        "200":
          description: 翻译成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationTask"
  /zotero/config/status:
    get:
      tags: [Zotero]
      summary: 获取 Zotero 配置状态
      operationId: getZoteroConfigStatus
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoteroConfigStatus"
  /zotero/sync/{paper_id}:
    post:
      tags: [Zotero]
      summary: 同步单篇论文到 Zotero
      operationId: syncPaperToZotero
      parameters:
        - in: path
          name: paper_id
          required: true
          schema:
            type: string
          description: 论文唯一标识
      responses:
        "200":
          description: 同步状态已返回
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRecord"
  /zotero/exports/bibtex:
    post:
      tags: [Zotero]
      summary: 批量导出 BibTeX
      operationId: exportBibtex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BibtexExportRequest"
      responses:
        "200":
          description: 导出成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibtexExportResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, environment, version]
      properties:
        status:
          type: string
        environment:
          type: string
        version:
          type: string
    PaperQuery:
      type: object
      required: [days, page, page_size]
      properties:
        keyword:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        days:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    Paper:
      type: object
      required:
        [id, title, authors, summary, published_at, updated_at, categories, primary_category, source_url, pdf_url, favorite_state, zotero_sync_state]
      properties:
        id:
          type: string
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        summary:
          type: string
        translated_summary:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        categories:
          type: array
          items:
            type: string
        primary_category:
          type: string
        source_url:
          type: string
          format: uri
        pdf_url:
          type: string
          format: uri
        favorite_state:
          type: boolean
        zotero_sync_state:
          type: string
          enum: [not_synced, synced, failed]
    PaperListResponse:
      type: object
      required: [query, items, page, page_size, total, has_more]
      properties:
        query:
          $ref: "#/components/schemas/PaperQuery"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Paper"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        has_more:
          type: boolean
    TrendSummaryItem:
      type: object
      required: [rank, trend_title, summary, representative_paper_ids]
      properties:
        rank:
          type: integer
        trend_title:
          type: string
        summary:
          type: string
        representative_paper_ids:
          type: array
          items:
            type: string
    TrendSummary:
      type: object
      required: [category, days, generated_at, intro, items, dismissible, status]
      properties:
        category:
          type: string
          nullable: true
        days:
          type: integer
        generated_at:
          type: string
          format: date-time
        intro:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TrendSummaryItem"
        dismissible:
          type: boolean
        status:
          type: string
        warning:
          type: string
          nullable: true
    TranslationRequest:
      type: object
      required: [paper_id, source_summary]
      properties:
        paper_id:
          type: string
        source_summary:
          type: string
        target_language:
          type: string
          default: zh-CN
    TranslationTask:
      type: object
      required: [paper_id, status, translated_summary, requested_at]
      properties:
        paper_id:
          type: string
        status:
          type: string
          enum: [success, degraded, failed]
        translated_summary:
          type: string
        requested_at:
          type: string
          format: date-time
        warning:
          type: string
          nullable: true
    ZoteroConfigStatus:
      type: object
      required: [configured, library_type]
      properties:
        configured:
          type: boolean
        user_id:
          type: string
          nullable: true
        library_type:
          type: string
        warning:
          type: string
          nullable: true
    SyncRecord:
      type: object
      required: [paper_id, status, synced_at]
      properties:
        paper_id:
          type: string
        status:
          type: string
          enum: [synced, failed]
        zotero_item_key:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        synced_at:
          type: string
          format: date-time
          nullable: true
    BibtexExportRequest:
      type: object
      required: [paper_ids]
      properties:
        paper_ids:
          type: array
          items:
            type: string
    BibtexExportResponse:
      type: object
      required: [content, exported_count]
      properties:
        content:
          type: string
        exported_count:
          type: integer
