openapi: 3.1.0
info:
  title: XivDaily API Draft
  version: 0.1.0
  description: >
    XivDaily 当前后端接口草案。路径与字段以仓库内真实 FastAPI 实现为准。
servers:
  - url: http://127.0.0.1:8000
    description: 本机开发环境
tags:
  - name: Health
  - name: Papers
  - name: AI
  - name: Config
  - name: Zotero
paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        "200":
          description: 服务健康
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /papers:
    get:
      tags: [Papers]
      summary: 查询论文列表
      operationId: listPapers
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 搜索关键词；未传 days 时会触发全 arXiv 搜索。
        - in: query
          name: category
          schema:
            type: string
          description: arXiv 分类，如 cs.CV。
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
          description: 可选回溯天数；无关键词缺省为 7，有关键词缺省为 null。
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 页码。
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: 每页数量，后端内部字段名为 page_size。
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperListResponse"
  /summaries/trends:
    get:
      tags: [AI]
      summary: 生成首页趋势摘要
      operationId: getTrendSummary
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: 聚焦领域。
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
          description: 兼容旧客户端；当前后端固定按最近 3 天生成并返回 days=3。
      responses:
        "200":
          description: 生成成功或降级成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendSummary"
  /translations:
    post:
      tags: [AI]
      summary: 翻译单篇论文摘要
      operationId: createTranslation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationRequest"
      responses:
        "200":
          description: 翻译成功或降级成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationTask"
  /ai/config/status:
    get:
      tags: [AI]
      summary: 获取大模型兼容配置状态
      operationId: getAiConfigStatus
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConfigStatus"
  /config/integrations:
    get:
      tags: [Config]
      summary: 读取设置页集成配置
      operationId: readIntegrations
      responses:
        "200":
          description: 获取成功，敏感字段只返回脱敏状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfigRead"
  /config/zotero:
    put:
      tags: [Config]
      summary: 保存 Zotero 配置
      operationId: saveZoteroConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoteroConfigSaveRequest"
      responses:
        "200":
          description: 保存成功，返回脱敏后的完整集成配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfigRead"
  /config/zotero/test:
    post:
      tags: [Config]
      summary: 测试 Zotero 配置填写状态
      operationId: testZoteroConfig
      responses:
        "200":
          description: 测试结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigTestResult"
  /config/llm:
    put:
      tags: [Config]
      summary: 保存大模型配置
      operationId: saveLlmConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmConfigSaveRequest"
      responses:
        "200":
          description: 保存成功，返回脱敏后的完整集成配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfigRead"
  /config/llm/test:
    post:
      tags: [Config]
      summary: 测试大模型配置填写状态
      operationId: testLlmConfig
      responses:
        "200":
          description: 测试结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigTestResult"
  /zotero/config/status:
    get:
      tags: [Zotero]
      summary: 获取 Zotero 兼容配置状态
      operationId: getZoteroConfigStatus
      responses:
        "200":
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoteroConfigStatus"
  /zotero/sync/{paper_id}:
    post:
      tags: [Zotero]
      summary: 同步单篇论文到 Zotero
      operationId: syncPaperToZotero
      parameters:
        - in: path
          name: paper_id
          required: true
          schema:
            type: string
          description: 论文唯一标识。
      responses:
        "200":
          description: 同步状态已返回
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoteroSyncResult"
  /zotero/exports/bibtex:
    post:
      tags: [Zotero]
      summary: 批量导出 BibTeX
      operationId: exportBibtex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BibtexExportRequest"
      responses:
        "200":
          description: 导出成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibtexExportResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, environment, version]
      properties:
        status:
          type: string
        environment:
          type: string
        version:
          type: string
    PaperQuery:
      type: object
      required: [page, page_size]
      properties:
        keyword:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        days:
          type: integer
          nullable: true
          minimum: 1
          maximum: 30
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 50
    Paper:
      type: object
      required:
        [id, title, authors, summary, published_at, updated_at, categories, primary_category, source_url, pdf_url, favorite_state, zotero_sync_state]
      properties:
        id:
          type: string
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        summary:
          type: string
        translated_summary:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        categories:
          type: array
          items:
            type: string
        primary_category:
          type: string
        source_url:
          type: string
          format: uri
        pdf_url:
          type: string
          format: uri
        favorite_state:
          type: boolean
        zotero_sync_state:
          type: string
          enum: [not_synced, synced, failed]
    PaperListResponse:
      type: object
      required: [query, items, page, page_size, total, has_more, status]
      properties:
        query:
          $ref: "#/components/schemas/PaperQuery"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Paper"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        has_more:
          type: boolean
        status:
          type: string
          enum: [ok, empty, stale, unavailable]
        warning:
          type: string
          nullable: true
        empty_reason:
          type: string
          nullable: true
          enum: [time_window_filtered, no_results]
    TrendSummaryItem:
      type: object
      required: [rank, trend_title, summary, representative_paper_ids]
      properties:
        rank:
          type: integer
        trend_title:
          type: string
        summary:
          type: string
        representative_paper_ids:
          type: array
          items:
            type: string
    TrendSummary:
      type: object
      required: [category, days, generated_at, intro, items, dismissible, status]
      properties:
        category:
          type: string
          nullable: true
        days:
          type: integer
          description: 当前固定返回 3。
        generated_at:
          type: string
          format: date-time
        intro:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TrendSummaryItem"
        dismissible:
          type: boolean
        status:
          type: string
          enum: [success, degraded]
        warning:
          type: string
          nullable: true
    TranslationRequest:
      type: object
      required: [paper_id, source_summary]
      properties:
        paper_id:
          type: string
        source_summary:
          type: string
        target_language:
          type: string
          default: zh-CN
    TranslationTask:
      type: object
      required: [paper_id, status, translated_summary, requested_at]
      properties:
        paper_id:
          type: string
        status:
          type: string
          enum: [success, degraded, failed]
        translated_summary:
          type: string
        requested_at:
          type: string
          format: date-time
        warning:
          type: string
          nullable: true
    AiConfigStatus:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean
    SecretFieldState:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean
        masked:
          type: string
          nullable: true
          description: 脱敏展示值，例如 ***1234。
    ZoteroConfigRead:
      type: object
      required: [library_type, api_key, target_collection_name]
      properties:
        user_id:
          type: string
          nullable: true
        library_type:
          type: string
          default: user
        api_key:
          $ref: "#/components/schemas/SecretFieldState"
        target_collection_name:
          type: string
          default: XivDaily
    LlmConfigRead:
      type: object
      required: [base_url, api_key, model]
      properties:
        base_url:
          type: string
        api_key:
          $ref: "#/components/schemas/SecretFieldState"
        model:
          type: string
    IntegrationConfigRead:
      type: object
      required: [zotero, llm]
      properties:
        zotero:
          $ref: "#/components/schemas/ZoteroConfigRead"
        llm:
          $ref: "#/components/schemas/LlmConfigRead"
    ZoteroConfigSaveRequest:
      type: object
      properties:
        user_id:
          type: string
          nullable: true
        library_type:
          type: string
          default: user
        api_key:
          type: string
          nullable: true
          description: 为空或 null 时保留已有密钥。
        target_collection_name:
          type: string
          default: XivDaily
    LlmConfigSaveRequest:
      type: object
      properties:
        base_url:
          type: string
          default: https://api.openai.com/v1
        api_key:
          type: string
          nullable: true
          description: 为空或 null 时保留已有密钥。
        model:
          type: string
          default: gpt-5.4
    ConfigTestResult:
      type: object
      required: [ok, status, message]
      properties:
        ok:
          type: boolean
        status:
          type: string
        message:
          type: string
    ZoteroConfigStatus:
      type: object
      required: [configured, library_type, target_collection_name, target_collection_status]
      properties:
        configured:
          type: boolean
        user_id:
          type: string
          nullable: true
        library_type:
          type: string
        target_collection_name:
          type: string
        target_collection_key:
          type: string
          nullable: true
        target_collection_status:
          type: string
          enum: [not_configured, ready, created, error]
        warning:
          type: string
          nullable: true
    ZoteroSyncResult:
      type: object
      required:
        [paper_id, status, synced_at, target_collection_name, target_collection_status, visibility_status]
      properties:
        paper_id:
          type: string
        status:
          type: string
          enum: [synced, failed]
        zotero_item_key:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        synced_at:
          type: string
          format: date-time
        library_type:
          type: string
          nullable: true
        user_id:
          type: string
          nullable: true
        target_collection_name:
          type: string
        target_collection_key:
          type: string
          nullable: true
        target_collection_status:
          type: string
          enum: [not_configured, ready, created, error]
        visibility_status:
          type: string
          enum: [verified, missing_from_collection, unverified, not_checked]
        visibility_message:
          type: string
          nullable: true
    BibtexExportRequest:
      type: object
      required: [paper_ids]
      properties:
        paper_ids:
          type: array
          items:
            type: string
    BibtexExportResponse:
      type: object
      required: [content, exported_count]
      properties:
        content:
          type: string
        exported_count:
          type: integer
